name: Build and Push Docker Images

on:
  push:
    branches: [main]

jobs:
  build-shiny:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - uses: docker/setup-buildx-action@v3

      - uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile
          platforms: linux/amd64
          push: true
          tags: ghcr.io/alexeypetrov1/ttrssr-shiny:latest
          cache-from: type=gha,scope=shiny
          cache-to: type=gha,scope=shiny,mode=max

  build-mcp:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - uses: docker/setup-buildx-action@v3

      - uses: docker/build-push-action@v6
        with:
          context: .
          file: inst/mcp/Dockerfile
          platforms: linux/amd64
          push: true
          tags: ghcr.io/alexeypetrov1/ttrssr-mcp:latest
          cache-from: type=gha,scope=mcp
          cache-to: type=gha,scope=mcp,mode=max
