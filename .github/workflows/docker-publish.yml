name: Build and Push Docker Images  #cb-gr-1

on:  #cb-gr-2
  push:  #cb-gr-3
    branches: [main]  #cb-gr-4

jobs:  #cb-gr-5
  build-shiny:  #cb-gr-6
    runs-on: ubuntu-latest  #cb-gr-7
    permissions:  #cb-gr-8
      contents: read  #cb-gr-9
      packages: write  #cb-gr-10
    steps:  #cb-gr-11
      - uses: actions/checkout@v4  #cb-gr-12

      - uses: docker/login-action@v3  #cb-gr-13
        with:  #cb-gr-14
          registry: ghcr.io  #cb-gr-15
          username: ${{ github.actor }}  #cb-gr-16
          password: ${{ secrets.GITHUB_TOKEN }}  #cb-gr-17

      - uses: docker/setup-buildx-action@v3  #cb-gr-18

      - uses: docker/build-push-action@v6  #cb-gr-19
        with:  #cb-gr-20
          context: .  #cb-gr-21
          file: Dockerfile  #cb-gr-22
          platforms: linux/amd64  #cb-gr-23
          push: true  #cb-gr-24
          tags: ghcr.io/alexeypetrov1/ttrssr-shiny:latest  #cb-gr-25
          cache-from: type=gha,scope=shiny  #cb-gr-26
          cache-to: type=gha,scope=shiny,mode=max  #cb-gr-27

  build-mcp:  #cb-gr-28
    runs-on: ubuntu-latest  #cb-gr-29
    permissions:  #cb-gr-30
      contents: read  #cb-gr-31
      packages: write  #cb-gr-32
    steps:  #cb-g-300
      - uses: actions/checkout@v4  #cb-g-301

      - uses: docker/login-action@v3  #cb-g-302
        with:  #cb-g-303
          registry: ghcr.io  #cb-g-304
          username: ${{ github.actor }}  #cb-g-305
          password: ${{ secrets.GITHUB_TOKEN }}  #cb-g-306

      - uses: docker/setup-buildx-action@v3  #cb-g-307

      - uses: docker/build-push-action@v6  #cb-g-308
        with:  #cb-g-309
          context: .  #cb-g-310
          file: inst/mcp/Dockerfile  #cb-g-311
          platforms: linux/amd64  #cb-g-312
          push: true  #cb-g-313
          tags: ghcr.io/alexeypetrov1/ttrssr-mcp:latest  #cb-g-314
          cache-from: type=gha,scope=mcp  #cb-g-315
          cache-to: type=gha,scope=mcp,mode=max  #cb-g-316
