## ============================================================
## TT-RSS + Аналитический стек (единый compose)
##
## Запуск:
##   docker compose up -d --build
##
## Интерфейсы:
##   TT-RSS   → http://localhost:${TTRSS_PORT:-8080}
##   Shiny    → http://localhost:3838/ttrss
##   MCP      → http://localhost:8000/mcp
##   CH HTTP  → http://localhost:8123
## ============================================================

networks:
  ttrss_default:
    driver: bridge
  analytics_net:
    driver: bridge

volumes:
  clickhouse_data:
  clickhouse_logs:
  ttrss_db_data:
  ttrss_data:

services:

  # =========================================================================
  # TT-RSS Stack
  # =========================================================================

  # ── PostgreSQL для TT-RSS ────────────────────────────────────────────────
  ttrss-db:
    image: postgres:15-alpine
    container_name: ttrss-db
    restart: unless-stopped
    networks:
      - ttrss_default
    environment:
      POSTGRES_USER:     ttrss
      POSTGRES_PASSWORD: ${TTRSS_DB_PASSWORD:-ttrss_secret}
      POSTGRES_DB:       ttrss
    volumes:
      - ttrss_db_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ttrss"]
      interval: 10s
      timeout:  5s
      retries:  5

  # ── TT-RSS (PHP-FPM + Nginx + cron) ─────────────────────────────────────
  ttrss:
    image: wangqiru/ttrss:latest
    container_name: ttrss
    restart: unless-stopped
    networks:
      - ttrss_default
    depends_on:
      ttrss-db:
        condition: service_healthy
    ports:
      - "${TTRSS_PORT:-8080}:80"
    environment:
      SELF_URL_PATH: http://localhost:${TTRSS_PORT:-8080}/
      DB_HOST:       ttrss-db
      DB_PORT:       5432
      DB_NAME:       ttrss
      DB_USER:       ttrss
      DB_PASS:       ${TTRSS_DB_PASSWORD:-ttrss_secret}
      ENABLE_PLUGINS: auth_internal,fever
    volumes:
      - ttrss_data:/var/www/html/tt-rss/feed-icons
    healthcheck:
      test: ["CMD-SHELL", "wget -q --spider http://127.0.0.1/ || exit 1"]
      interval: 10s
      timeout:  5s
      retries:  10
      start_period: 30s

  # ── Автоматическое включение API для admin ───────────────────────────────
  ttrss-init:
    image: wangqiru/ttrss:latest
    container_name: ttrss-init
    restart: "no"
    networks:
      - ttrss_default
    depends_on:
      ttrss:
        condition: service_healthy
    environment:
      DB_HOST: ttrss-db
      DB_PORT: 5432
      DB_NAME: ttrss
      DB_USER: ttrss
      DB_PASS: ${TTRSS_DB_PASSWORD:-ttrss_secret}
    entrypoint: >
      sh -c "
        echo 'Initializing TT-RSS config...';
        sh /wait-for.sh $$DB_HOST:$$DB_PORT -- php /initialize.php;
        echo 'Enabling API access for admin user...';
        s6-setuidgid nobody php /var/www/update.php --user-enable-api admin:true;
        echo 'API access enabled.'
      "

  # =========================================================================
  # Analytics Stack
  # =========================================================================

  # ── ClickHouse ───────────────────────────────────────────────────────────
  clickhouse:
    image: clickhouse/clickhouse-server:24-alpine
    container_name: clickhouse
    restart: unless-stopped
    networks:
      - ttrss_default
      - analytics_net
    ports:
      - "${CH_HTTP_PORT:-8123}:8123"
      - "${CH_NATIVE_PORT:-9000}:9000"
    environment:
      CLICKHOUSE_DB:       ${CH_DB:-ttrss}
      CLICKHOUSE_USER:     ${CH_USER:-default}
      CLICKHOUSE_PASSWORD: ${CH_PASSWORD:-}
    volumes:
      - clickhouse_data:/var/lib/clickhouse
      - clickhouse_logs:/var/log/clickhouse-server
    healthcheck:
      test: ["CMD-SHELL", "clickhouse-client --query 'SELECT 1'"]
      interval: 10s
      timeout:  5s
      retries:  5
    ulimits:
      nofile:
        soft: 262144
        hard: 262144

  # ── Shiny Dashboard ──────────────────────────────────────────────────────
  shiny:
    image: ghcr.io/alexeypetrov1/ttrssr-shiny:latest
    container_name: ttrss-shiny
    restart: unless-stopped
    networks:
      - ttrss_default
      - analytics_net
    depends_on:
      clickhouse:
        condition: service_healthy
    ports:
      - "${SHINY_PORT:-3838}:3838"
    environment:
      TTRSS_URL:       http://ttrss/
      TTRSS_USER:      ${TTRSS_ADMIN_USER:-admin}
      TTRSS_PASSWORD:  ${TTRSS_ADMIN_PASSWORD:-password}
      CH_HOST:         clickhouse
      CH_PORT:         9000
      CH_DB:           ${CH_DB:-ttrss}
      CH_USER:         ${CH_USER:-default}
      CH_PASSWORD:     ${CH_PASSWORD:-}
      LLM_API_KEY:     ${LLM_API_KEY:-}
      CLASSIFY_METHOD: ${CLASSIFY_METHOD:-lda}
      N_TOPICS:        ${N_TOPICS:-8}
      YANDEX_CLOUD_API_KEY: ${YANDEX_CLOUD_API_KEY:-}
      YANDEX_CLOUD_FOLDER: ${YANDEX_CLOUD_FOLDER:-}
      YANDEX_CLOUD_MODEL: ${YANDEX_CLOUD_MODEL:-yandexgpt-5-lite/latest}
    volumes:
      - ./data:/srv/shiny-server/ttrss/shiny/data:ro

  # ── Scheduler (periodic fetch + write to ClickHouse) ─────────────────────
  scheduler:
    image: ghcr.io/alexeypetrov1/ttrssr-shiny:latest
    container_name: ttrss-scheduler
    restart: unless-stopped
    working_dir: /pkg/ttrssR
    networks:
      - ttrss_default
      - analytics_net
    depends_on:
      clickhouse:
        condition: service_healthy
      ttrss-init:
        condition: service_completed_successfully
    environment:
      TTRSS_URL:       http://ttrss/
      TTRSS_USER:      ${TTRSS_ADMIN_USER:-admin}
      TTRSS_PASSWORD:  ${TTRSS_ADMIN_PASSWORD:-password}
      CH_HOST:         clickhouse
      CH_PORT:         9000
      CH_DB:           ${CH_DB:-ttrss}
      CH_USER:         ${CH_USER:-default}
      CH_PASSWORD:     ${CH_PASSWORD:-}
      MAX_ARTICLES:    ${MAX_ARTICLES:-500}
      CLASSIFY_METHOD: ${CLASSIFY_METHOD:-lda}
      N_TOPICS:        ${N_TOPICS:-8}
      LLM_API_KEY:     ${LLM_API_KEY:-}
      YANDEX_CLOUD_API_KEY: ${YANDEX_CLOUD_API_KEY:-}
      YANDEX_CLOUD_FOLDER: ${YANDEX_CLOUD_FOLDER:-}
      YANDEX_CLOUD_MODEL: ${YANDEX_CLOUD_MODEL:-yandexgpt-5-lite/latest}
      YANDEX_CLOUD_BASE_URL: ${YANDEX_CLOUD_BASE_URL:-https://ai.api.cloud.yandex.net/v1}
      YANDEX_CACHE_PATH: ${YANDEX_CACHE_PATH:-/pkg/ttrssR/data/yandex_llm_cache.rds}
      SCHEDULER_INTERVAL_SECONDS: ${SCHEDULER_INTERVAL_SECONDS:-300}
      INIT_FEEDS_ON_START: ${INIT_FEEDS_ON_START:-true}
      INIT_FEEDS_RETRY_MAX: ${INIT_FEEDS_RETRY_MAX:-5}
      INIT_FEEDS_RETRY_DELAY_SECONDS: ${INIT_FEEDS_RETRY_DELAY_SECONDS:-30}
      CONTINUE_ON_FEEDS_INIT_ERROR: ${CONTINUE_ON_FEEDS_INIT_ERROR:-true}
      RUN_ADD_FEEDS_EACH_CYCLE: ${RUN_ADD_FEEDS_EACH_CYCLE:-false}
    volumes:
      - ./data:/pkg/ttrssR/data
    command: >
      sh -lc "
      set +e;
      normalize_bool() {
        case \"\$${1:-}\" in
          1|true|TRUE|yes|YES|on|ON) echo true ;;
          *) echo false ;;
        esac
      };
      INIT_ON_START=$$(normalize_bool \"$${INIT_FEEDS_ON_START:-true}\");
      CONTINUE_ON_INIT_ERR=$$(normalize_bool \"$${CONTINUE_ON_FEEDS_INIT_ERROR:-true}\");
      RUN_EACH_CYCLE=$$(normalize_bool \"$${RUN_ADD_FEEDS_EACH_CYCLE:-false}\");
      INIT_MAX=$${INIT_FEEDS_RETRY_MAX:-5};
      INIT_DELAY=$${INIT_FEEDS_RETRY_DELAY_SECONDS:-30};

      if [ \"$$INIT_ON_START\" = \"true\" ]; then
        attempt=1;
        init_ok=0;
        while [ \"$$attempt\" -le \"$$INIT_MAX\" ]; do
          echo \"=== Feed bootstrap (attempt $$attempt/$$INIT_MAX) ===\";
          Rscript data-raw/add_security_feeds.R;
          code=$$?;
          if [ \"$$code\" -eq 0 ]; then
            init_ok=1;
            echo \"Feed bootstrap completed.\";
            break;
          fi
          echo \"Feed bootstrap failed with exit code $$code.\";
          if [ \"$$attempt\" -lt \"$$INIT_MAX\" ]; then
            echo \"Retrying in $$INIT_DELAY seconds...\";
            sleep \"$$INIT_DELAY\";
          fi
          attempt=$$((attempt + 1));
        done;

        if [ \"$$init_ok\" -ne 1 ]; then
          if [ \"$$CONTINUE_ON_INIT_ERR\" = \"true\" ]; then
            echo \"Feed bootstrap exhausted retries; continuing to fetch loop.\";
          else
            echo \"Feed bootstrap failed and CONTINUE_ON_FEEDS_INIT_ERROR=false; exiting.\";
            exit 1;
          fi
        fi
      fi;

      while true; do
        if [ \"$$RUN_EACH_CYCLE\" = \"true\" ]; then
          echo \"=== Feed sync before fetch cycle ===\";
          Rscript data-raw/add_security_feeds.R || echo \"Feed sync failed; continuing fetch cycle.\";
        fi;
        Rscript data-raw/fetch_news.R || echo \"fetch_news failed; will retry next cycle.\";
        sleep \"$${SCHEDULER_INTERVAL_SECONDS:-300}\";
      done"

  # ── MCP Server ───────────────────────────────────────────────────────────
  mcp:
    image: ghcr.io/alexeypetrov1/ttrssr-mcp:latest
    container_name: ttrss-mcp
    restart: unless-stopped
    networks:
      - analytics_net
    depends_on:
      clickhouse:
        condition: service_healthy
    ports:
      - "${MCP_PORT:-8000}:8000"
    environment:
      CH_HOST:     clickhouse
      CH_PORT:     9000
      CH_DB:       ${CH_DB:-ttrss}
      CH_USER:     ${CH_USER:-default}
      CH_PASSWORD: ${CH_PASSWORD:-}
